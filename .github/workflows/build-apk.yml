name: Build Signed Release AAB
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Capacitor
        run: npm install
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Add or sync Android platform
        run: |
          if [ ! -d android ]; then npx cap add android; fi
          npx cap sync android
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/purityapps-release.keystore
      - name: Build signed release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease             -Pandroid.injected.signing.store.file=${{ github.workspace }}/purityapps-release.keystore             -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }}             -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }}             -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
      - name: Create GitHub Release
        run: |
          AAB="android/app/build/outputs/bundle/release/app-release.aab"
          gh release create v1.0.0 "$AAB"             --title "v1.0.0 - Signed Release"             --notes "Signed release AAB. Install via Google Play or use bundletool to extract APK."             --repo ${{ github.repository }} 2>/dev/null ||           gh release upload v1.0.0 "$AAB" --repo ${{ github.repository }} --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
